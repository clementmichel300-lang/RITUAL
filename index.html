<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>RITUAL — test auto-deploy</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Space+Grotesk:wght@500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{background:#07071b;color:#e2e8f0;font-family:'Inter',sans-serif;min-height:100vh;overflow-x:hidden}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:#7c3aed55;border-radius:2px}::-webkit-scrollbar-thumb:hover{background:#7c3aed}

/* ── AUTH ──────────────────────────── */
#auth{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;z-index:9000;background:#07071b;overflow-y:auto}
.auth-bg{position:fixed;inset:0;pointer-events:none;overflow:hidden;z-index:0}
.auth-orb{position:absolute;border-radius:50%;filter:blur(80px);opacity:.18}
.auth-box{position:relative;z-index:1;width:100%;max-width:420px;padding:20px 16px}
.auth-logo{text-align:center;margin-bottom:32px}
.auth-logo-icon{font-size:52px;margin-bottom:8px;display:block}
.auth-logo-title{font-size:28px;font-weight:800;font-family:'Space Grotesk',sans-serif;background:linear-gradient(135deg,#a78bfa,#22d3ee);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.auth-logo-sub{font-size:13px;color:#475569;margin-top:4px}
.auth-card{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08);border-radius:20px;padding:28px 24px;backdrop-filter:blur(20px)}
.auth-tabs{display:flex;gap:0;background:rgba(255,255,255,.04);border-radius:10px;padding:3px;margin-bottom:24px}
.auth-tab{flex:1;padding:8px;border-radius:8px;border:none;background:none;color:#64748b;font-size:14px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;transition:all .2s}
.auth-tab.on{background:linear-gradient(135deg,#7c3aed,#0891b2);color:#fff}
.auth-input-wrap{position:relative;margin-bottom:14px}
.auth-input-icon{position:absolute;left:13px;top:50%;transform:translateY(-50%);font-size:15px;color:#475569;pointer-events:none}
.auth-input{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.09);color:#e2e8f0;border-radius:12px;padding:12px 14px 12px 40px;width:100%;font-family:'Inter',sans-serif;font-size:14px;outline:none;transition:border-color .2s}
.auth-input:focus{border-color:rgba(124,58,237,.6);box-shadow:0 0 0 3px rgba(124,58,237,.12)}
::placeholder{color:rgba(255,255,255,.18)}
.auth-btn{width:100%;padding:14px;border-radius:12px;border:none;background:linear-gradient(135deg,#7c3aed,#0891b2);color:#fff;font-size:15px;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif;margin-top:4px;transition:opacity .2s;position:relative;overflow:hidden}
.auth-btn::after{content:'';position:absolute;inset:0;background:rgba(255,255,255,0);transition:background .2s}
.auth-btn:hover::after{background:rgba(255,255,255,.08)}
.auth-error{background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.25);border-radius:10px;padding:10px 14px;font-size:13px;color:#fca5a5;margin-bottom:12px;display:none}
.auth-accounts{margin-top:20px}
.auth-account-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);margin-bottom:6px;cursor:pointer;transition:border-color .2s}
.auth-account-item:hover{border-color:rgba(124,58,237,.3)}
.auth-avatar{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,#7c3aed,#0891b2);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0}

/* ── LAYOUT ────────────────────────── */
#app{display:none;min-height:100vh}

/* Desktop sidebar */
@media(min-width:768px){
  #app{display:flex;flex-direction:row}
  #sidebar{width:220px;min-width:220px;background:rgba(255,255,255,.02);border-right:1px solid rgba(255,255,255,.06);display:flex;flex-direction:column;padding:20px 12px;position:fixed;top:0;left:0;bottom:0;z-index:200;overflow-y:auto}
  #main{margin-left:220px;flex:1;display:flex;flex-direction:column;min-height:100vh;min-width:0}
  #topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 28px;border-bottom:1px solid rgba(255,255,255,.05);background:rgba(7,7,27,.9);backdrop-filter:blur(20px);position:sticky;top:0;z-index:100}
  #page{padding:28px 32px;flex:1}
  #nav{display:none}
  #mobile-header{display:none}
}
@media(max-width:767px){
  #sidebar{display:none}
  #main{flex:1;min-width:0}
  #topbar{display:none}
  #page{padding:14px 16px 80px}
  #mobile-header{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:rgba(7,7,27,.95);backdrop-filter:blur(20px);border-bottom:1px solid rgba(255,255,255,.05);position:sticky;top:0;z-index:100}
  #nav{position:fixed;bottom:0;left:0;right:0;background:rgba(7,7,27,.97);backdrop-filter:blur(24px);border-top:1px solid rgba(255,255,255,.06);padding:6px 4px max(8px,env(safe-area-inset-bottom));z-index:100}
}

/* Sidebar styles */
.sb-logo{display:flex;align-items:center;gap:10px;padding:8px 10px;margin-bottom:20px}
.sb-logo-icon{font-size:24px}
.sb-logo-text{font-size:16px;font-weight:800;font-family:'Space Grotesk',sans-serif;background:linear-gradient(135deg,#a78bfa,#22d3ee);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.sb-nav{flex:1}
.sb-btn{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:12px;border:none;background:transparent;color:#64748b;font-size:13px;font-weight:500;cursor:pointer;font-family:'Inter',sans-serif;width:100%;margin-bottom:3px;transition:all .15s;text-align:left}
.sb-btn:hover{background:rgba(255,255,255,.04);color:#94a3b8}
.sb-btn.on{background:rgba(124,58,237,.15);color:#a78bfa;font-weight:600;border-left:3px solid #7c3aed;padding-left:9px}
.sb-btn .sb-icon{font-size:16px;width:20px;text-align:center;flex-shrink:0}
.sb-section{font-size:9px;color:#334155;text-transform:uppercase;letter-spacing:.12em;padding:12px 12px 5px;font-weight:700}
.sb-user{margin-top:auto;padding-top:12px;border-top:1px solid rgba(255,255,255,.05)}
.sb-user-card{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:12px;background:rgba(255,255,255,.03)}
.sb-avatar{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,#7c3aed,#0891b2);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0}
.sb-user-name{font-size:13px;font-weight:600;color:#e2e8f0;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sb-user-email{font-size:10px;color:#475569;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sb-logout{background:none;border:none;color:#475569;font-size:16px;cursor:pointer;flex-shrink:0;padding:4px;border-radius:6px;transition:color .2s}
.sb-logout:hover{color:#ef4444}

/* Topbar */
.tb-title{font-size:16px;font-weight:700;font-family:'Space Grotesk',sans-serif;color:#e2e8f0}
.tb-date{font-size:12px;color:#475569}
.tb-xp{display:flex;align-items:center;gap:8px;padding:6px 14px;border-radius:10px;background:rgba(124,58,237,.1);border:1px solid rgba(124,58,237,.2)}
.tb-streak{display:flex;align-items:center;gap:6px;padding:6px 14px;border-radius:10px;background:rgba(251,146,60,.07);border:1px solid rgba(251,146,60,.18)}
.tb-right{display:flex;align-items:center;gap:8px}

/* Mobile nav */
.nav-row{display:flex;justify-content:space-around}
.nbtn{display:flex;flex-direction:column;align-items:center;gap:2px;padding:5px 7px;border-radius:10px;border:none;cursor:pointer;background:transparent;font-family:'Inter',sans-serif}
.nbtn.on{background:rgba(124,58,237,.18);outline:1px solid rgba(124,58,237,.3)}
.nicon{font-size:17px;line-height:1}
.nlbl{font-size:9px;color:#475569}
.nbtn.on .nlbl{color:#a78bfa;font-weight:700}

/* Cards & components */
.card{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);border-radius:16px;padding:16px 18px;margin-bottom:14px}
.gtext{background:linear-gradient(135deg,#a78bfa,#22d3ee);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.btn-p{background:linear-gradient(135deg,#7c3aed,#0891b2);border:none;border-radius:12px;padding:8px 16px;color:#fff;font-size:13px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif}
.btn-d{background:rgba(239,68,68,.2);border:none;border-radius:12px;padding:8px 16px;color:#ef4444;font-size:13px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif}
.btn-full{width:100%;padding:13px;border-radius:12px;border:none;background:linear-gradient(135deg,#7c3aed,#0891b2);color:#fff;font-size:14px;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif;margin-top:4px}
.chip{display:inline-block;padding:5px 12px;border-radius:99px;font-size:12px;background:rgba(255,255,255,.06);color:#94a3b8;border:none;cursor:pointer;font-family:'Inter',sans-serif;margin:3px}
.chip.on{background:linear-gradient(135deg,#7c3aed,#0891b2);color:#fff}
input:not(.auth-input),textarea,select{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.09);color:#e2e8f0;border-radius:10px;padding:10px 13px;width:100%;font-family:'Inter',sans-serif;font-size:14px;outline:none;transition:border-color .2s}
input:not(.auth-input):focus,textarea:focus,select:focus{border-color:rgba(124,58,237,.55);box-shadow:0 0 0 3px rgba(124,58,237,.1)}
input[type=range]{border:none!important;background:transparent!important;box-shadow:none!important;padding:8px 0!important;accent-color:#7c3aed}
input[type=date]::-webkit-calendar-picker-indicator,input[type=time]::-webkit-calendar-picker-indicator{filter:invert(1) opacity(.4)}
select option{background:#0f0f1a}
.bar{background:rgba(255,255,255,.06);border-radius:99px;overflow:hidden}
.bar-f{background:linear-gradient(90deg,#7c3aed,#22d3ee);border-radius:99px;transition:width .5s}
.hbtn{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:10px;background:transparent;border:1px solid transparent;cursor:pointer;text-align:left;width:100%;transition:all .15s;margin-bottom:6px;font-family:'Inter',sans-serif}
.hbtn.done{background:rgba(124,58,237,.12);border-color:rgba(124,58,237,.3)}
.hcheck{width:22px;height:22px;border-radius:50%;border:2px solid rgba(255,255,255,.2);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s}
.hbtn.done .hcheck{background:linear-gradient(135deg,#7c3aed,#22d3ee);border:none}
.hlabel{font-size:14px;flex:1;color:#e2e8f0;transition:color .15s}
.hbtn.done .hlabel{color:#64748b;text-decoration:line-through}
.hxp{font-size:10px;padding:2px 7px;border-radius:99px;flex-shrink:0;background:rgba(255,255,255,.04);color:#334155}
.hbtn.done .hxp{background:rgba(124,58,237,.15);color:#7c3aed}
.lbl{font-size:11px;color:#64748b;display:block;margin-bottom:5px}
.wdot{width:8px;height:8px;border-radius:50%;display:inline-block;margin:0 1px}

/* Desktop grid helpers */
@media(min-width:768px){
  .desk-grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
  .desk-grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
  .card{border-radius:18px}
}

/* Toast */
#toast{position:fixed;top:20px;right:24px;left:auto;transform:translateX(120%);background:linear-gradient(135deg,#7c3aed,#0891b2);padding:13px 22px;border-radius:14px;box-shadow:0 8px 32px rgba(0,0,0,.6);z-index:9999;color:#fff;font-size:14px;font-weight:600;min-width:220px;text-align:center;transition:transform .35s cubic-bezier(.22,1,.36,1);pointer-events:none}
#toast.show{transform:translateX(0)}
@media(max-width:767px){
  #toast{right:auto;left:50%;transform:translateX(-50%) translateY(-80px)}
  #toast.show{transform:translateX(-50%) translateY(0)}
}

/* Settings overlay */
#soverlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:8000;display:none;align-items:center;justify-content:center}
#sbox{background:#0f0f1f;border:1px solid rgba(255,255,255,.08);border-radius:20px;padding:28px;width:100%;max-width:400px}

/* Animations */
@keyframes fu{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.page-anim{animation:fu .25s both}
@keyframes pg{0%,100%{box-shadow:0 0 20px rgba(124,58,237,.25)}50%{box-shadow:0 0 45px rgba(124,58,237,.55)}}
.pglow{animation:pg 2.5s infinite}
.ring-fill{transition:stroke-dashoffset .85s cubic-bezier(.4,0,.2,1)}
@keyframes authIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.auth-box{animation:authIn .4s both}
@keyframes orb1{0%,100%{transform:translate(0,0)}50%{transform:translate(30px,-20px)}}
@keyframes orb2{0%,100%{transform:translate(0,0)}50%{transform:translate(-25px,15px)}}
</style>
</head>
<body>

<!-- ── AUTH SCREEN ──────────────────────────────────────────────────── -->
<div id="auth">
  <div class="auth-bg">
    <div class="auth-orb" style="width:400px;height:400px;background:#7c3aed;top:-100px;left:-100px;animation:orb1 8s ease-in-out infinite"></div>
    <div class="auth-orb" style="width:350px;height:350px;background:#0891b2;bottom:-80px;right:-80px;animation:orb2 10s ease-in-out infinite"></div>
    <div class="auth-orb" style="width:200px;height:200px;background:#ec4899;top:50%;left:50%;margin:-100px;opacity:.1;animation:orb1 12s ease-in-out infinite reverse"></div>
  </div>
  <div class="auth-box">
    <div class="auth-logo">
      <div class="auth-logo-title">RITUAL</div>
      <div class="auth-logo-sub">Ton système de performance quotidien</div>
    </div>
    <div class="auth-card">
      <div class="auth-tabs">
        <button class="auth-tab on" id="tab-login" onclick="switchAuthTab('login')">Se connecter</button>
        <button class="auth-tab" id="tab-signup" onclick="switchAuthTab('signup')">Créer un compte</button>
      </div>
      <div id="auth-error" class="auth-error"></div>

      <!-- Login form -->
      <div id="form-login">
        <div class="auth-input-wrap">
          <span class="auth-input-icon">📧</span>
          <input class="auth-input" id="login-email" type="email" placeholder="Adresse e-mail" autocomplete="email" onkeydown="if(event.key==='Enter')document.getElementById('login-pass').focus()">
        </div>
        <div class="auth-input-wrap">
          <span class="auth-input-icon">🔒</span>
          <input class="auth-input" id="login-pass" type="password" placeholder="Mot de passe" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()">
        </div>
        <button class="auth-btn" onclick="doLogin()">Connexion →</button>
        <div id="saved-accounts" style="margin-top:20px"></div>
      </div>

      <!-- Signup form -->
      <div id="form-signup" style="display:none">
        <div class="auth-input-wrap">
          <span class="auth-input-icon">👤</span>
          <input class="auth-input" id="su-name" type="text" placeholder="Ton prénom / surnom" autocomplete="name" onkeydown="if(event.key==='Enter')document.getElementById('su-email').focus()">
        </div>
        <div class="auth-input-wrap">
          <span class="auth-input-icon">📧</span>
          <input class="auth-input" id="su-email" type="email" placeholder="Adresse e-mail" autocomplete="email" onkeydown="if(event.key==='Enter')document.getElementById('su-pass').focus()">
        </div>
        <div class="auth-input-wrap">
          <span class="auth-input-icon">🔒</span>
          <input class="auth-input" id="su-pass" type="password" placeholder="Mot de passe (min 6 caractères)" autocomplete="new-password" onkeydown="if(event.key==='Enter')document.getElementById('su-pass2').focus()">
        </div>
        <div class="auth-input-wrap">
          <span class="auth-input-icon">🔒</span>
          <input class="auth-input" id="su-pass2" type="password" placeholder="Confirmer le mot de passe" autocomplete="new-password" onkeydown="if(event.key==='Enter')doSignup()">
        </div>
        <button class="auth-btn" onclick="doSignup()">Créer mon compte</button>
      </div>
    </div>
  </div>
</div>

<!-- ── MAIN APP ──────────────────────────────────────────────────────── -->
<div id="app">

  <!-- Sidebar (desktop) -->
  <aside id="sidebar">
    <div class="sb-logo">
      <span class="sb-logo-text">RITUAL</span>
    </div>
    <nav class="sb-nav" id="sb-nav"></nav>
    <div class="sb-user" id="sb-user"></div>
  </aside>

  <!-- Main content -->
  <div id="main">

    <!-- Topbar (desktop) -->
    <div id="topbar">
      <div>
        <div class="tb-title" id="tb-title">Dashboard</div>
        <div class="tb-date" id="tb-date"></div>
      </div>
      <div class="tb-right">
        <div class="tb-xp" id="tb-xp"></div>
        <div class="tb-streak" id="tb-streak"></div>
        <button onclick="toggleSettings()" style="background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);border-radius:10px;width:36px;height:36px;cursor:pointer;font-size:16px;color:#94a3b8">⚙️</button>
      </div>
    </div>

    <!-- Mobile header -->
    <div id="mobile-header">
      <div style="font-size:15px;font-weight:700;font-family:'Space Grotesk',sans-serif;" class="gtext">RITUAL</div>
      <div style="display:flex;gap:8px;align-items:center">
        <div style="font-size:12px;color:#a78bfa;font-weight:600" id="mob-xp"></div>
        <button onclick="toggleSettings()" style="background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);border-radius:10px;width:32px;height:32px;cursor:pointer;font-size:14px;color:#94a3b8">⚙️</button>
      </div>
    </div>

    <!-- Page content -->
    <div id="page"></div>

    <!-- Mobile nav -->
    <nav id="nav"><div class="nav-row" id="nav-row"></div></nav>
  </div>
</div>

<!-- Toast -->
<div id="toast"></div>

<!-- Settings overlay -->
<div id="soverlay" onclick="closeSettings()">
  <div id="sbox" onclick="event.stopPropagation()">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px">
      <span style="font-size:16px;font-weight:700;font-family:'Space Grotesk',sans-serif">⚙️ Paramètres</span>
      <button onclick="closeSettings()" style="background:none;border:none;color:#64748b;font-size:22px;cursor:pointer">×</button>
    </div>
    <label class="lbl">Ton prénom / surnom</label>
    <input id="s-name" style="margin-bottom:14px" placeholder="Champion">
    <label class="lbl">Salle / semaine : <strong id="s-salle-lbl" style="color:#7c3aed">3×</strong></label>
    <input type="range" id="s-salle" min="1" max="7" value="3" oninput="document.getElementById('s-salle-lbl').textContent=this.value+'×'" style="margin-bottom:12px">
    <label class="lbl">CAP (course) / semaine : <strong id="s-cap-lbl" style="color:#22d3ee">2×</strong></label>
    <input type="range" id="s-cap" min="1" max="7" value="2" oninput="document.getElementById('s-cap-lbl').textContent=this.value+'×'" style="margin-bottom:20px">
    <button class="btn-full" onclick="saveSettings()">✅ Sauvegarder</button>
    <div style="margin-top:14px;padding-top:14px;border-top:1px solid rgba(255,255,255,.06)">
      <button onclick="doLogout()" style="width:100%;padding:12px;border-radius:12px;border:none;background:rgba(239,68,68,.1);color:#ef4444;font-size:14px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif">🚪 Se déconnecter</button>
    </div>
  </div>
</div>

<script>
// ── CONSTANTS ────────────────────────────────────────────────────────────

const H=[
  {id:'reveil',  l:'Réveil 7h30 — pas de snooze',          c:'Matin',   xp:15,i:'⏰'},
  {id:'eau',     l:'500ml eau au lever',                     c:'Matin',   xp:8, i:'💧'},
  {id:'dehors',  l:'20 min dehors + shadow boxing',          c:'Matin',   xp:20,i:'🥊'},
  {id:'creme_m', l:'Crème acné matin',                      c:'Matin',   xp:8, i:'🧴'},
  {id:'creatine',l:'Créatine 3g + protéines',               c:'Matin',   xp:10,i:'💊'},
  {id:'todoist', l:'3 tâches Todoist planifiées',            c:'Matin',   xp:12,i:'📋'},
  {id:'dw1',     l:'Deep Work #1 — 90 min',                 c:'Journée', xp:30,i:'💻'},
  {id:'dw2',     l:'Deep Work #2 — 90 min',                 c:'Journée', xp:30,i:'💻'},
  {id:'sport',   l:'Sport — salle / karaté / CAP / maison', c:'Journée', xp:25,i:'🏋️'},
  {id:'etire',   l:'Étirements 10 min',                     c:'Journée', xp:10,i:'🧘'},
  {id:'pc_off',  l:'PC éteint à 22h',                       c:'Soir',    xp:15,i:'🖥️'},
  {id:'douche',  l:'Douche',                                 c:'Soir',    xp:8, i:'🚿'},
  {id:'creme_s', l:'Crème acné soir',                       c:'Soir',    xp:8, i:'🧴'},
  {id:'dump',    l:'Brain dump papier',                      c:'Soir',    xp:12,i:'📓'},
  {id:'coucher', l:'Couché à 22h30',                        c:'Soir',    xp:20,i:'😴'},
];

function getDataKey(email){return'rut-data-'+btoa(email.toLowerCase().trim())}
function loadUserData(email){try{const r=localStorage.getItem(getDataKey(email));if(r)return JSON.parse(r)}catch(e){}

// ── AUTH LOGIC ────────────────────────────────────────────────────────────

function hashPwd(p){
  let h=0;for(let i=0;i<p.length;i++){h=((h<<5)-h)+p.charCodeAt(i);h|=0}
  return Math.abs(h).toString(36);
}

function showAuthError(msg){
  const el=document.getElementById('auth-error');
  el.textContent=msg;el.style.display='block';
  setTimeout(()=>el.style.display='none',4000);
}

function switchAuthTab(tab){
  document.getElementById('form-login').style.display=tab==='login'?'block':'none';
  document.getElementById('form-signup').style.display=tab==='signup'?'block':'none';
  document.getElementById('tab-login').classList.toggle('on',tab==='login');
  document.getElementById('tab-signup').classList.toggle('on',tab==='signup');
  document.getElementById('auth-error').style.display='none';
}

function doLogin(){
  const email=document.getElementById('login-email').value.trim().toLowerCase();
  const pass=document.getElementById('login-pass').value;
  if(!email||!pass){showAuthError('Remplis tous les champs.');return}
  const accounts=getAccounts();
  if(!accounts[email]){showAuthError("Aucun compte avec cet e-mail.");return}
  if(accounts[email].pwd!==hashPwd(pass)){showAuthError("Mot de passe incorrect.");return}
  startSession({email,name:accounts[email].name});
}

function doSignup(){
  const name=document.getElementById('su-name').value.trim();
  const email=document.getElementById('su-email').value.trim().toLowerCase();
  const pass=document.getElementById('su-pass').value;
  const pass2=document.getElementById('su-pass2').value;
  if(!name||!email||!pass||!pass2){showAuthError('Remplis tous les champs.');return}
  if(pass.length<6){showAuthError('Mot de passe trop court (min 6 caractères).');return}
  if(pass!==pass2){showAuthError('Les mots de passe ne correspondent pas.');return}
  if(!/\S+@\S+\.\S+/.test(email)){showAuthError('E-mail invalide.');return}
  const accounts=getAccounts();
  if(accounts[email]){showAuthError('Un compte existe déjà avec cet e-mail.');return}
  accounts[email]={name,pwd:hashPwd(pass),createdAt:new Date().toISOString()};
  saveAccounts(accounts);
  startSession({email,name});
}

function startSession(s){
  SESSION=s;
  saveSession(s);
  DATA=loadUserData(s.email);
  if(DATA.settings?.name&&DATA.settings.name!=='Champion')SESSION.name=DATA.settings.name;
  else DATA.settings.name=s.name;
  document.getElementById('auth').style.display='none';
  document.getElementById('app').style.display='';
  render();
  renderSavedAccounts();
}

function doLogout(){
  closeSettings();
  SESSION=null;DATA=null;TAB='dash';
  saveSession(null);
  document.getElementById('auth').style.display='flex';
  document.getElementById('app').style.display='none';
  document.getElementById('login-email').value='';
  document.getElementById('login-pass').value='';
  renderSavedAccounts();
}

function renderSavedAccounts(){
  const accounts=getAccounts();
  const keys=Object.keys(accounts);
  const el=document.getElementById('saved-accounts');
  if(!el)return;
  if(keys.length===0){el.innerHTML='';return}
  el.innerHTML=`<div style="font-size:11px;color:#334155;text-transform:uppercase;letter-spacing:.1em;margin-bottom:8px">Comptes existants</div>`+
    keys.map(email=>{
      const a=accounts[email];
      const ini=(a.name||'?')[0].toUpperCase();
      return`<div class="auth-account-item" onclick="quickLogin('${email.replace(/'/g,"\\'")}')">

// ── UTILS ────────────────────────────────────────────────────────────────

function gdk(d=new Date()){return d.toISOString().split('T')[0]}
function todayFR(){const d=new Date();return DF[d.getDay()]+' '+d.getDate()+' '+MF[d.getMonth()]+' '+d.getFullYear()}
function fmtDate(s){try{const d=new Date(s+'T12:00:00');return d.getDate()+' '+MF[d.getMonth()]}catch(e2){return s}}
function e(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function save(){saveUserData()}
function weekDates(){
  const t=new Date(),day=t.getDay(),mon=new Date(t);
  mon.setDate(t.getDate()-(day===0?6:day-1));
  return Array.from({length:7},(_,i)=>{const d=new Date(mon);d.setDate(mon.getDate()+i);return gdk(d)});
}

// ── XP / STREAK / LEVEL ──────────────────────────────────────────────────

function calcXP(){
  let x=0;
  Object.values(DATA.habits||{}).forEach(day=>{
    const done=H.filter(h=>day[h.id]);
    done.forEach(h=>x+=h.xp);
    if(done.length===H.length)x+=75;
  });
  Object.values(DATA.reviews||{}).forEach(r=>{if(r&&r.victoire)x+=30});
  (DATA.goals||[]).forEach(g=>{if(g.completed)x+=50});
  (DATA.books||[]).forEach(b=>{if(b.status==='lu')x+=40});
  return x;
}

function calcStreak(){
  let s=0;const t=new Date();
  for(let i=0;i<=365;i++){
    const d=new Date(t);d.setDate(t.getDate()-i);
    const k=gdk(d),day=DATA.habits[k]||{};
    const done=H.filter(h=>day[h.id]).length;
    if(done>=Math.ceil(H.length/2))s++;
    else if(i===0)continue;
    else break;
  }
  return s;
}

function getLI(xp){
  let cur=LV[0],nxt=LV[1];
  for(let i=LV.length-1;i>=0;i--){if(xp>=LV[i].xp){cur=LV[i];nxt=LV[i+1]||null;break}}
  const inL=xp-cur.xp,need=nxt?nxt.xp-cur.xp:1;
  return{cur,nxt,inL,need,pct:nxt?Math.min(100,(inL/need)*100):100};
}

function checkBadges(xp,streak){
  const ub=new Set(DATA.badges||[]);
  const h=DATA.habits||{};
  const totalH=Object.values(h).reduce((s,d)=>s+H.filter(x=>d[x.id]).length,0);
  const totalR=Object.values(DATA.reviews||{}).filter(r=>r&&r.victoire).length;
  const perfD=Object.values(h).filter(d=>H.filter(x=>d[x.id]).length===H.length).length;
  const sp=(DATA.sport?.sessions||[]).length;
  const dw=Object.values(h).reduce((s,d)=>s+(d.dw1?1:0)+(d.dw2?1:0),0);
  const bk=(DATA.books||[]).filter(b=>b.status==='lu').length;
  const gl=(DATA.goals||[]).length;
  const lv=getLI(xp).cur.l;
  const rev=Object.values(h).filter(d=>d.reveil).length;
  const hasMMA=(DATA.goals||[]).some(g=>g.title?.toLowerCase().includes('mma'));
  const hasBiz=(DATA.goals||[]).some(g=>g.cat==='Business');
  const cond={b1:totalH>=1,b2:perfD>=1,b3:streak>=3,b4:streak>=7,b5:streak>=30,
    b6:totalR>=1,b7:totalR>=10,b8:sp>=10,b9:dw>=20,ba:bk>=5,bb:gl>=5,
    bc:lv>=5,bd:lv>=10,be:hasMMA,bf:rev>=7,bg:hasBiz};
  const unlocked=[];
  BG.forEach(b=>{if(!ub.has(b.id)&&cond[b.id]){unlocked.push(b.id);ub.add(b.id)}});
  if(unlocked.length){DATA.badges=[...ub];save();const bg=BG.find(b=>b.id===unlocked[0]);if(bg)toast('🏅 Badge débloqué : '+bg.n+' '+bg.i)}
}

// ── RING SVG ─────────────────────────────────────────────────────────────

function ring(pct,size,sw,color){
  const r=(size-sw)/2,c=2*Math.PI*r,off=c-(pct/100)*c;
  return`<svg width="${size}" height="${size}" style="transform:rotate(-90deg);flex-shrink:0">
    <circle cx="${size/2}" cy="${size/2}" r="${r}" stroke="rgba(255,255,255,.06)" stroke-width="${sw}" fill="none"/>
    <circle cx="${size/2}" cy="${size/2}" r="${r}" stroke="${color}" stroke-width="${sw}" fill="none"
      stroke-dasharray="${c}" stroke-dashoffset="${off}" stroke-linecap="round" class="ring-fill"/>
  </svg>`;
}

// ── PAGE: SEMAINE ─────────────────────────────────────────────────────────

function pageWeek(){
  const wd=weekDates(),today=gdk();
  const salleGoal=DATA.settings?.salleGoal||3;
  const capGoal=DATA.settings?.capGoal||2;
  const weekSp=(DATA.sport?.sessions||[]).filter(s=>wd.includes(s.date));
  const weekSalle=weekSp.filter(s=>s.type==='Salle');
  const weekCap=weekSp.filter(s=>s.type==='CAP');
  let dayGrid='';
  wd.forEach(date=>{
    const d=new Date(date+'T12:00:00'),dh=DATA.habits[date]||{};
    const done=H.filter(h=>dh[h.id]).length,pct=Math.round((done/H.length)*100);
    const isT=date===today,col=pct>=80?'#10b981':pct>=50?'#f59e0b':pct>0?'#ef4444':'#1e293b';
    dayGrid+=`<div class="card" style="padding:10px 6px;text-align:center;margin-bottom:0;${isT?'border-color:rgba(124,58,237,.5)':''}">
      <div style="font-size:9px;color:#475569;text-transform:uppercase">${DF[d.getDay()]}</div>
      <div style="font-size:15px;font-weight:700;margin:4px 0;color:${isT?'#a78bfa':'#e2e8f0'}">${d.getDate()}</div>
      <div style="font-size:11px;font-weight:600;color:${col}">${pct>0?pct+'%':'—'}</div>
      <div style="margin-top:5px;height:3px;border-radius:99px;background:${col};opacity:${pct>0?1:.12}"></div>
    </div>`;
  });
  let dotRows='';
  H.forEach(h=>{
    const cnt=wd.filter(d=>(DATA.habits[d]||{})[h.id]).length;
    let dots='';
    wd.forEach(d=>{const done=(DATA.habits[d]||{})[h.id];dots+=`<span class="wdot" style="background:${done?'#7c3aed':'rgba(255,255,255,.06)'};border:1px solid ${done?'#7c3aed':'rgba(255,255,255,.08)'}"></span>`;});
    dotRows+=`<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px"><span style="font-size:11px;color:#94a3b8;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${h.i} ${h.l}</span><div style="flex-shrink:0">${dots}</div><span style="font-size:11px;color:#7c3aed;width:16px;text-align:right;flex-shrink:0">${cnt}</span></div>`;
  });
  const spRows=weekSp.map(s=>`<div style="display:flex;gap:8px;padding:6px 8px;border-radius:8px;background:rgba(255,255,255,.03);margin-top:5px;font-size:12px;color:#64748b"><span>${s.type==='Karaté'?'🥋':s.type==='CAP'?'🏃':s.type==='Salle'?'🏋️':'💪'}</span><span style="flex:1">${e(s.type)}</span><span>${s.dur} min</span><span style="color:${parseInt(s.int)>=8?'#ef4444':parseInt(s.int)>=6?'#f59e0b':'#10b981'}">${s.int}/10</span></div>`).join('');
  return`<div class="page-anim">
    <h2 class="gtext" style="font-size:20px;font-weight:800;font-family:'Space Grotesk',sans-serif;margin-bottom:16px">Cette Semaine</h2>
    <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin-bottom:16px">${dayGrid}</div>
    <div class="card"><div style="font-size:12px;color:#64748b;margin-bottom:10px;font-weight:600">Récap habitudes — 7 jours</div>${dotRows}</div>
    <div class="card">
      <div style="font-size:12px;font-weight:600;color:#94a3b8;margin-bottom:10px">💪 Sport cette semaine</div>
      <div style="display:flex;justify-content:space-between;font-size:11px;margin-bottom:5px"><span style="color:#a78bfa">🏋️ Salle</span><span style="color:${weekSalle.length>=salleGoal?'#10b981':'#f59e0b'}">${weekSalle.length}/${salleGoal}</span></div>
      <div style="display:flex;gap:5px;margin-bottom:10px">${Array.from({length:salleGoal},(_,i)=>`<div style="flex:1;height:5px;border-radius:99px;background:${i<weekSalle.length?'linear-gradient(90deg,#7c3aed,#a78bfa)':'rgba(255,255,255,.06)'}"></div>`).join('')}</div>
      <div style="display:flex;justify-content:space-between;font-size:11px;margin-bottom:5px"><span style="color:#22d3ee">🏃 CAP</span><span style="color:${weekCap.length>=capGoal?'#10b981':'#f59e0b'}">${weekCap.length}/${capGoal}</span></div>
      <div style="display:flex;gap:5px;margin-bottom:8px">${Array.from({length:capGoal},(_,i)=>`<div style="flex:1;height:5px;border-radius:99px;background:${i<weekCap.length?'linear-gradient(90deg,#0891b2,#22d3ee)':'rgba(255,255,255,.06)'}"></div>`).join('')}</div>
      ${spRows}
    </div>
  </div>`;
}

// ── COPY CHECKIN ──────────────────────────────────────────────────────────

function copyCheckin(){
  const pre=document.getElementById('checkin-pre');
  const btn=document.getElementById('copy-btn');
  if(!pre)return;
  const text=pre.innerText||pre.textContent||'';
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).then(()=>{
      if(btn){btn.textContent='✅ Copié !';btn.style.color='#10b981';setTimeout(()=>{btn.textContent='📋 Copier dans le presse-papier';btn.style.color='#a78bfa'},2000)}
    }).catch(()=>fallbackCopy(text,btn));
  } else {fallbackCopy(text,btn)}
}
function fallbackCopy(text,btn){
  const ta=document.createElement('textarea');
  ta.value=text;ta.style.position='fixed';ta.style.opacity='0';
  document.body.appendChild(ta);ta.focus();ta.select();
  try{document.execCommand('copy');if(btn){btn.textContent='✅ Copié !';btn.style.color='#10b981';setTimeout(()=>{btn.textContent='📋 Copier dans le presse-papier';btn.style.color='#a78bfa'},2000)}}catch(e){}
  document.body.removeChild(ta);
}

  groups.principal.forEach(t=>{html+=`<button class="sb-btn${TAB===t.id?' on':''}" onclick="go('${t.id}')"><span class="sb-icon">${t.icon}</span>${t.label}</button>`});
  html+=`<div class="sb-section">Personnel</div>`;
  groups.perso.forEach(t=>{html+=`<button class="sb-btn${TAB===t.id?' on':''}" onclick="go('${t.id}')"><span class="sb-icon">${t.icon}</span>${t.label}</button>`});
  document.getElementById('sb-nav').innerHTML=html;
  const ini=(SESSION?.name||'?')[0].toUpperCase();
  document.getElementById('sb-user').innerHTML=`<div class="sb-user-card"><div class="sb-avatar">${ini}</div><div style="flex:1;min-width:0"><div class="sb-user-name">${e(DATA.settings?.name||SESSION?.name||'')}</div><div class="sb-user-email">${e(SESSION?.email||'')}</div></div><button class="sb-logout" onclick="doLogout()" title="Déconnexion">⏻</button></div>`;
}

function renderTopbar(){
  const xp=calcXP(),li=getLI(xp),streak=calcStreak();
  const tb=document.getElementById('tb-title');if(tb)tb.textContent=TLABELS[TAB]||'';
  const td=document.getElementById('tb-date');if(td)td.textContent=todayFR();
  const txp=document.getElementById('tb-xp');if(txp)txp.innerHTML=`<span style="font-size:11px;color:#a78bfa;font-weight:600">⚡ ${xp.toLocaleString()} XP</span><span style="font-size:10px;color:#64748b">Niv.${li.cur.l} ${li.cur.n}</span>`;
  const ts=document.getElementById('tb-streak');if(ts)ts.innerHTML=`<span style="font-size:14px">🔥</span><span style="font-size:12px;color:#fb923c;font-weight:600">${streak} j</span>`;
  const mxp=document.getElementById('mob-xp');if(mxp)mxp.textContent=`⚡${xp.toLocaleString()} · 🔥${streak}`;
}

function renderMobileNav(){
  const el=document.getElementById('nav-row');if(!el)return;
  el.innerHTML=TABS.map(t=>`<button class="nbtn${TAB===t.id?' on':''}" onclick="go('${t.id}')"><span class="nicon">${t.icon}</span><span class="nlbl">${t.label}</span></button>`).join('');
}

function renderUI(){
  renderSidebar();renderTopbar();renderMobileNav();
}

function render(){
  renderUI();
  const scrollY=window.scrollY;
  document.getElementById('page').innerHTML=PAGES[TAB]();
  if(TAB!=='review')window.scrollTo(0,scrollY);
}

// ── INIT ─────────────────────────────────────────────────────────────────

SESSION=getSession();
if(SESSION){
  DATA=loadUserData(SESSION.email);
  document.getElementById('auth').style.display='none';
  document.getElementById('app').style.display='';
  render();
}
renderSavedAccounts();
</script>
</body>
</html>
